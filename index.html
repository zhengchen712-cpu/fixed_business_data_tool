<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商机数据自动处理工具 - AGI188</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000;--text:#f5f5f7;--sub:#86868b;--dim:#48484a;--blue:#2997ff;--purple:#bf5af2;--border:#333;--success:#30d158;--warning:#ffd60a;--error:#ff453a}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* 导航 */
.nav{position:fixed;top:0;left:0;right:0;z-index:99;background:rgba(0,0,0,0.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(255,255,255,0.04)}
.nav-in{max-width:960px;margin:0 auto;padding:0 24px;height:48px;display:flex;justify-content:space-between;align-items:center}
.nav-brand{font-size:16px;font-weight:700;letter-spacing:0.02em;text-decoration:none;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-r{display:flex;align-items:center;gap:20px;list-style:none}
.nav-r a{font-size:12px;color:var(--sub);text-decoration:none;transition:color 0.2s}
.nav-r a:hover{color:var(--text)}

/* 主内容区 */
.main{max-width:960px;margin:0 auto;padding:100px 24px 80px}

/* 头部 */
.hero{text-align:center;margin-bottom:48px}
.hero-icon{font-size:64px;margin-bottom:16px}
.hero h1{font-size:40px;font-weight:700;letter-spacing:-0.03em;margin-bottom:8px;background:linear-gradient(180deg,#f5f5f7,#a1a1a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:17px;color:var(--sub)}

/* 上传区域 */
.upload-zone{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:20px;padding:48px;text-align:center;margin-bottom:32px;transition:all 0.4s cubic-bezier(0.25,0.1,0.25,1)}
.upload-zone:hover{border-color:rgba(41,151,255,0.3)}
.upload-zone.dragover{border-color:var(--blue);background:rgba(41,151,255,0.06)}
.upload-icon{font-size:48px;margin-bottom:16px}
.upload-zone h3{font-size:20px;font-weight:600;margin-bottom:8px}
.upload-zone p{font-size:14px;color:var(--sub);margin-bottom:20px}
.file-btn{display:inline-block;padding:12px 28px;border:none;border-radius:980px;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.3s;letter-spacing:0.02em}
.file-btn:hover{box-shadow:0 8px 30px rgba(41,151,255,0.25);transform:translateY(-1px)}
#fileInput{display:none}

/* 状态标签 */
.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;font-size:11px;font-weight:500}
.tag.on{background:rgba(48,209,88,0.1);color:var(--success)}
.tag.warn{background:rgba(255,214,10,0.1);color:var(--warning)}
.tag.err{background:rgba(255,69,58,0.1);color:var(--error)}

/* 日志区域 */
.log-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:20px;padding:32px;margin-bottom:32px}
.log-card h3{font-size:18px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
#log{width:100%;height:320px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:12px;padding:16px;color:var(--text);font-family:'SF Mono','Monaco','Consolas',monospace;font-size:12px;line-height:1.7;resize:vertical;outline:none;white-space:pre-wrap}

/* 统计卡片 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;transition:all 0.3s}
.stat-card:hover{border-color:rgba(41,151,255,0.2)}
.stat-num{font-size:32px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.stat-label{font-size:12px;color:var(--sub)}

/* 配置区域 */
.config-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:20px;padding:32px;margin-bottom:32px}
.config-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.config-head h3{font-size:18px;font-weight:600}
.config-actions{display:flex;gap:8px}
.small-btn{padding:8px 16px;border:1px solid var(--border);border-radius:980px;background:transparent;color:var(--sub);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s}
.small-btn:hover{border-color:var(--blue);color:var(--blue)}
#configArea{width:100%;height:240px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:12px;padding:16px;color:var(--text);font-family:'SF Mono','Monaco','Consolas',monospace;font-size:12px;line-height:1.6;resize:vertical;outline:none}
#configArea::placeholder{color:var(--dim)}

/* 下载按钮 */
.download-btn{width:100%;padding:16px;border:none;border-radius:980px;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-size:17px;font-weight:600;cursor:pointer;transition:all 0.3s;letter-spacing:0.02em;display:none}
.download-btn.show{display:block}
.download-btn:hover{box-shadow:0 8px 40px rgba(41,151,255,0.3);transform:translateY(-2px)}

/* 未匹配列表 */
.unmatched-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:20px;padding:32px;margin-top:32px;display:none}
.unmatched-card.show{display:block}
.unmatched-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.unmatched-head h3{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
#unmatchedList{width:100%;min-height:160px;max-height:320px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:12px;padding:16px;color:var(--text);font-family:'SF Mono','Monaco','Consolas',monospace;font-size:12px;line-height:1.8;overflow-y:auto;white-space:pre-wrap}

/* 分割线 */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:40px 0}

/* 底部 */
.foot{text-align:center;padding:40px 24px 48px;border-top:1px solid rgba(255,255,255,0.04)}
.foot p{font-size:12px;color:var(--dim);letter-spacing:0.02em}

/* 响应式 */
@media(max-width:768px){
    .hero h1{font-size:32px}
    .stats{grid-template-columns:repeat(2,1fr)}
    .upload-zone,.log-card,.config-card,.unmatched-card{padding:24px}
}
</style>
</head>
<body>

<nav class="nav">
    <div class="nav-in">
        <a href="https://www.agi188.work" class="nav-brand">AGI188</a>
        <ul class="nav-r">
            <li><a href="https://www.agi188.work#tools">返回工具集</a></li>
        </ul>
    </div>
</nav>

<div class="main">
    <div class="hero">
        <div class="hero-icon">📊</div>
        <h1>商机数据自动处理工具</h1>
        <p>Excel 上传 → 智能匹配 → 自动清洗 → 下载结果</p>
    </div>

    <!-- 上传区域 -->
    <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">📁</div>
        <h3>上传 Excel 文件</h3>
        <p>支持 .xlsx / .xls 格式，最大 50MB</p>
        <label class="file-btn">
            <input type="file" id="fileInput" accept=".xlsx,.xls">
            选择文件
        </label>
    </div>

    <!-- 统计面板 -->
    <div class="stats" id="stats" style="display:none">
        <div class="stat-card">
            <div class="stat-num" id="totalRows">0</div>
            <div class="stat-label">总行数</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="skipRows">0</div>
            <div class="stat-label">跳过 (已有价格)</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="matchRows">0</div>
            <div class="stat-label">匹配成功</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="unmatchRows">0</div>
            <div class="stat-label">未匹配</div>
        </div>
    </div>

    <!-- 日志区域 -->
    <div class="log-card">
        <h3>📝 处理日志 <span class="tag" id="statusTag">等待上传</span></h3>
        <textarea id="log" readonly placeholder="上传文件后，处理日志将显示在这里..."></textarea>
    </div>

    <!-- 下载按钮 -->
    <button class="download-btn" id="downloadBtn">📥 下载处理结果</button>

    <div class="divider"></div>

    <!-- 未匹配课程区域 -->
    <div class="unmatched-card" id="unmatchedCard">
        <div class="unmatched-head">
            <h3>⚠️ 未匹配课程列表 <span class="tag err" id="unmatchedCount">0 条</span></h3>
            <button class="small-btn" onclick="copyUnmatched()">📋 一键复制</button>
        </div>
        <div id="unmatchedList"></div>
        <p style="font-size:12px;color:var(--sub);margin-top:12px">💡 复制后粘贴到「自定义课程价格配置」中，批量添加价格</p>
    </div>

    <!-- 课程配置区域 -->
    <div class="config-card">
        <div class="config-head">
            <h3>⚙️ 课程价格配置</h3>
            <div class="config-actions">
                <button class="small-btn" onclick="loadDefaultConfig()">🔄 加载默认配置</button>
                <button class="small-btn" onclick="saveConfig()">💾 保存配置</button>
                <button class="small-btn" onclick="resetConfig()">↺ 重置</button>
            </div>
        </div>
        <textarea id="configArea" placeholder="格式：课程名称 价格&#10;每行一条，例如：&#10;2026年事业单位面试深度系统班 580&#10;院长亲批·申论1v1定制特训营 4980"></textarea>
        <p style="font-size:12px;color:var(--sub);margin-top:12px">💡 配置自动保存在本地浏览器，刷新不会丢失</p>
    </div>

    <div class="foot">
        <p>© 2026 AGI188.WORK · 商机数据自动处理工具 v20260428.3</p>
    </div>
</div>

<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
let defaultPriceMap = {};
let userConfig = {};
let resultData = null;
let unmatchedText = '';

// 从 GitHub 动态加载价格配置
async function loadPriceConfig() {
    try {
        const response = await fetch('https://raw.githubusercontent.com/zhengchen712-cpu/fixed_business_data_tool/main/price-config.json', { cache: 'no-cache' });
        if (!response.ok) throw new Error('加载失败');
        
        const config = await response.json();
        const flatMap = {};
        for (const [category, courses] of Object.entries(config.data)) {
            courses.forEach(item => {
                flatMap[item.name] = item.price;
            });
        }
        defaultPriceMap = flatMap;
        console.log(`✅ 默认配置加载成功，共 ${Object.keys(flatMap).length} 条课程`);
        return flatMap;
    } catch (err) {
        console.error('❌ 配置加载失败', err);
        return {};
    }
}

// 解析用户配置
function parseUserConfig(text) {
    const map = {};
    const lines = text.trim().split('\n');
    lines.forEach(line => {
        const parts = line.trim().split(/\s+/);
        if (parts.length >= 2) {
            const price = parseInt(parts[parts.length - 1]);
            if (!isNaN(price)) {
                const name = parts.slice(0, -1).join(' ');
                if (name) map[name] = price;
            }
        }
    });
    return map;
}

// 规范化名称（去掉特殊字符）
function normalizeName(name) {
    if (!name) return '';
    return String(name)
        .replace(/[\s\u3000\u00a0]+/g, '')
        .replace(/[""''()（）\[\]【】{}、，,\.。""''\-—_\/\\@#$%^&*+=`~<>?？;:：;'"'|\\]/g, '')
        .toLowerCase();
}

// 获取配置文本
function getConfigText() {
    const all = { ...defaultPriceMap, ...userConfig };
    let text = '';
    for (const [name, price] of Object.entries(all)) {
        text += `${name} ${price}\n`;
    }
    return text;
}

// 加载默认配置到文本框
function loadDefaultConfig() {
    document.getElementById('configArea').value = getConfigText();
}

// 保存用户配置
function saveConfig() {
    const text = document.getElementById('configArea').value;
    userConfig = parseUserConfig(text);
    localStorage.setItem('businessDataConfig', text);
    alert(`✅ 配置已保存，共 ${Object.keys(userConfig).length} 条课程价格`);
}

// 重置配置
function resetConfig() {
    if (confirm('确定要重置为默认配置吗？')) {
        localStorage.removeItem('businessDataConfig');
        document.getElementById('configArea').value = getConfigText();
        userConfig = {};
    }
}

// 复制未匹配列表
function copyUnmatched() {
    navigator.clipboard.writeText(unmatchedText).then(() => {
        alert('✅ 未匹配列表已复制到剪贴板');
    });
}

// 处理 Excel
function processExcel(data) {
    const logEl = document.getElementById('log');
    const tagEl = document.getElementById('statusTag');
    tagEl.className = 'tag warn';
    tagEl.textContent = '处理中...';
    logEl.textContent = '';

    // 查找价格列和课程列
    let priceCol = -1, courseCol = -1;
    for (let i = 0; i < data[0].length; i++) {
        const header = String(data[0][i] || '');
        if (header.includes('课程名称') || header.includes('课程名') || header.includes('商品名称')) {
            courseCol = i;
        }
        if (header.includes('课程价格') || header.includes('价格') || header.includes('商品价格')) {
            priceCol = i;
        }
    }

    if (priceCol === -1 || courseCol === -1) {
        tagEl.className = 'tag err';
        tagEl.textContent = '处理失败';
        logEl.textContent = `❌ 错误：找不到课程列或价格列\n\n当前表头：\n${data[0].join(' | ')}\n\n请确保 Excel 包含「课程名称」和「课程价格」列`;
        return;
    }

    logEl.textContent += `✅ 检测到列：\n`;
    logEl.textContent += `   课程名称列 → 第 ${courseCol + 1} 列\n`;
    logEl.textContent += `   课程价格列 → 第 ${priceCol + 1} 列\n\n`;

    // 合并配置（用户配置优先级更高）
    const finalMap = { ...defaultPriceMap, ...userConfig };
    const normalizedMap = {};
    for (const [name, price] of Object.entries(finalMap)) {
        normalizedMap[normalizeName(name)] = price;
    }

    logEl.textContent += `✅ 配置加载完成\n`;
    logEl.textContent += `   默认配置: ${Object.keys(defaultPriceMap).length} 条\n`;
    logEl.textContent += `   用户自定义: ${Object.keys(userConfig).length} 条\n`;
    logEl.textContent += `   总计规则数: ${Object.keys(finalMap).length} 条\n\n`;
    logEl.textContent += `🔄 开始处理数据...\n\n`;

    // 统计
    let updateCount = 0, skipCount = 0;
    const unmatchedCourses = {};

    // 从第2行开始处理（跳过表头）
    for (let i = 1; i < data.length; i++) {
        const row = data[i];
        if (!row) continue;
        
        const name = row[courseCol];
        const currentPrice = row[priceCol];

        // 已有价格（数字 > 0），跳过
        if (typeof currentPrice === 'number' && currentPrice > 0) {
            skipCount++;
            continue;
        }

        // 需要填充价格
        if (name) {
            const normalizedName = normalizeName(name);
            if (normalizedMap[normalizedName]) {
                row[priceCol] = normalizedMap[normalizedName];
                updateCount++;
            } else {
                // 关键词模糊匹配兜底
                let matched = false;
                for (const [keyName, price] of Object.entries(normalizedMap)) {
                    if (normalizedName.includes(keyName) || keyName.includes(normalizedName)) {
                        row[priceCol] = price;
                        updateCount++;
                        matched = true;
                        break;
                    }
                }
                if (!matched) {
                    const rawName = String(name).trim().substring(0, 80);
                    unmatchedCourses[rawName] = (unmatchedCourses[rawName] || 0) + 1;
                }
            }
        }
    }

    // 显示统计
    const totalRows = data.length - 1;
    const processedRows = totalRows - skipCount;
    const unmatchedCount = Object.keys(unmatchedCourses).length;

    logEl.textContent += `✅ 处理完成！\n\n`;
    logEl.textContent += `📊 数据概览: 共 ${totalRows} 行\n`;
    logEl.textContent += `⏭️  已有价格跳过: ${skipCount} 行\n`;
    logEl.textContent += `🎯 待处理 (price=null): ${processedRows} 行\n`;
    logEl.textContent += `✅ 匹配成功: ${updateCount} 行\n`;
    const matchRate = processedRows > 0 ? ((updateCount / processedRows) * 100).toFixed(1) : 100;
    logEl.textContent += `📈 匹配率: ${matchRate}%\n\n`;

    // 更新统计面板
    document.getElementById('totalRows').textContent = totalRows;
    document.getElementById('skipRows').textContent = skipCount;
    document.getElementById('matchRows').textContent = updateCount;
    document.getElementById('unmatchRows').textContent = unmatchedCount;
    document.getElementById('stats').style.display = 'grid';

    // 显示未匹配
    if (unmatchedCount > 0) {
        logEl.textContent += `⚠️ 未匹配课程: ${unmatchedCount} 条\n\n`;
        const sorted = Object.entries(unmatchedCourses).sort((a, b) => b[1] - a[1]);
        sorted.forEach(([name, count]) => {
            logEl.textContent += `   ${count}次 → ${name}\n`;
        });

        // 显示未匹配卡片
        unmatchedText = sorted.map(([name, count]) => `${name} 0`).join('\n');
        document.getElementById('unmatchedList').textContent = unmatchedText;
        document.getElementById('unmatchedCount').textContent = `${unmatchedCount} 条`;
        document.getElementById('unmatchedCard').classList.add('show');
    } else {
        logEl.textContent += `🎉 完美！所有课程全部匹配成功！`;
    }

    tagEl.className = 'tag on';
    tagEl.textContent = '处理完成';
    resultData = data;
    document.getElementById('downloadBtn').classList.add('show');
}

// 文件上传处理
document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const workbook = XLSX.read(e.target.result, { type: 'array' });
            const sheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            const data = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: null });
            processExcel(data);
        } catch (err) {
            document.getElementById('log').textContent = `❌ 文件解析失败：\n${err.message}`;
            document.getElementById('statusTag').className = 'tag err';
            document.getElementById('statusTag').textContent = '解析失败';
        }
    };
    reader.readAsArrayBuffer(file);
});

// 拖拽上传
const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    this.classList.add('dragover');
});
uploadZone.addEventListener('dragleave', function(e) {
    e.preventDefault();
    this.classList.remove('dragover');
});
uploadZone.addEventListener('drop', function(e) {
    e.preventDefault();
    this.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && (file.name.endsWith('.xlsx') || file.name.endsWith('.xls'))) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const workbook = XLSX.read(e.target.result, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                const data = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: null });
                processExcel(data);
            } catch (err) {
                document.getElementById('log').textContent = `❌ 文件解析失败：\n${err.message}`;
            }
        };
        reader.readAsArrayBuffer(file);
    }
});

// 下载功能
document.getElementById('downloadBtn').addEventListener('click', function() {
    if (!resultData) return;
    const worksheet = XLSX.utils.aoa_to_sheet(resultData);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, '处理结果');
    XLSX.writeFile(workbook, '商机数据处理结果_' + new Date().toISOString().slice(0, 10) + '.xlsx');
});

// 初始化
async function init() {
    await loadPriceConfig();
    // 加载本地保存的配置
    const saved = localStorage.getItem('businessDataConfig');
    if (saved) {
        document.getElementById('configArea').value = saved;
        userConfig = parseUserConfig(saved);
    } else {
        loadDefaultConfig();
    }
}
init();
</script>
</body>
</html>
